name: fridgechef
description: "FridgeChef - Cook what you already have."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  provider: ^6.1.2
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ingredients.json
    - assets/recipes.json
    - assets/image/fridgecheficon.PNG
  fonts:
    - family: GrandHotel
      fonts:
        - asset: assets/fonts/GrandHotel-Regular.ttf
